<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godze Mohan</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

html,body{
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#040814,#07152d,#12072d);
position:relative;
}

/* Aurora Background */

body::before,
body::after{
content:"";
position:absolute;
width:70vw;
height:70vw;
border-radius:50%;
filter:blur(100px);
animation:aurora 16s ease-in-out infinite alternate;
pointer-events:none;
}

body::before{
background:#35c8ff;
left:-15%;
top:-20%;
opacity:.45;
}

body::after{
background:#ff3b9d;
right:-15%;
bottom:-20%;
opacity:.45;
animation-delay:5s;
}

@keyframes aurora{
0%{
transform:translate(0,0) scale(1);
}
100%{
transform:translate(120px,-70px) scale(1.4);
}
}

/* Cursor Light */

.light{
position:absolute;
width:320px;
height:320px;
border-radius:50%;
background:radial-gradient(circle,
rgba(255,255,255,.25),
transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
mix-blend-mode:screen;
}

/* Glass Card */

.card{

position:relative;

padding:80px 90px;

border-radius:40px;

background:
linear-gradient(145deg,
rgba(255,255,255,.14),
rgba(255,255,255,.05));

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(35px) saturate(180%);
-webkit-backdrop-filter:blur(35px) saturate(180%);

box-shadow:
0 30px 70px rgba(0,0,0,.45),
inset 0 1px rgba(255,255,255,.3),
inset 0 -1px rgba(255,255,255,.05);

overflow:hidden;

transition:.15s;

}

/* Reflection */

.card::before{

content:"";

position:absolute;

left:-80%;
top:-60%;

width:45%;
height:220%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.55),
transparent);

transform:rotate(25deg);

animation:shine 7s linear infinite;

}

@keyframes shine{
100%{
left:170%;
}
}

/* Glass Text */

.logo{

display:inline-block;

font-size:clamp(60px,8vw,105px);

font-weight:800;

padding:22px 55px;

border-radius:28px;

color:white;

letter-spacing:3px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.30),
rgba(255,255,255,.08));

border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);

box-shadow:
0 18px 40px rgba(0,0,0,.25),
inset 0 2px rgba(255,255,255,.5),
inset 0 -2px rgba(255,255,255,.08);

position:relative;

overflow:hidden;

transition:.35s;

text-shadow:
0 0 20px rgba(255,255,255,.3);

}

.logo::before{

content:"";

position:absolute;

left:-120%;

top:0;

width:60%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.75),
transparent);

transform:skewX(-20deg);

animation:glass 4s linear infinite;

}

@keyframes glass{
100%{
left:220%;
}
}

.logo:hover{

transform:scale(1.04);

box-shadow:
0 0 40px rgba(120,220,255,.35),
0 25px 50px rgba(0,0,0,.35);

}

.coming{

margin-top:45px;

font-size:26px;

letter-spacing:10px;

font-weight:300;

color:white;

animation:pulse 2.5s infinite;

}

@keyframes pulse{

50%{
opacity:.45;
letter-spacing:14px;
}

}

.email{

margin-top:30px;

display:inline-block;

padding:15px 28px;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

backdrop-filter:blur(15px);

color:white;

font-size:18px;

transition:.35s;

}

.email:hover{

background:rgba(255,255,255,.14);

transform:translateY(-3px);

box-shadow:0 0 30px rgba(53,200,255,.35);

}

@media(max-width:768px){

.card{
padding:45px 25px;
}

.logo{
padding:15px 25px;
}

.coming{
font-size:18px;
letter-spacing:6px;
}

.email{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="light"></div>

<div class="card">

<div class="logo">
Godze Mohan
</div>

<div class="coming">
WEB PAGE COMING SOON...
</div>

<div class="email">
📧 contact@godzemohan.in
</div>

</div>

<script>

const light=document.querySelector(".light");
const card=document.querySelector(".card");

document.addEventListener("mousemove",(e)=>{

light.style.left=e.clientX+"px";
light.style.top=e.clientY+"px";

let x=(window.innerWidth/2-e.clientX)/35;
let y=(window.innerHeight/2-e.clientY)/35;

card.style.transform=
`perspective(1200px)
rotateY(${-x}deg)
rotateX(${y}deg)
translateZ(20px)`;

});

document.addEventListener("mouseleave",()=>{

card.style.transform=
"perspective(1200px) rotateX(0deg) rotateY(0deg)";

});

</script>

</body>
</html>
